<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "clay",
  "heroLayout": "split",
  "cardStyle": "outlined",
  "showMarquee": true
}/*EDITMODE-END*/;

const ACCENT_COLORS = {
  clay:   'oklch(0.585 0.232 27)',
  amber:  'oklch(0.700 0.150 70)',
  forest: 'oklch(0.560 0.110 150)',
  steel:  'oklch(0.560 0.120 248)',
};

function CalcSection() {
  return (
    <section id="calc" className="section" style={{ background: 'var(--surface-2)', borderBlock: '1px solid var(--line)' }}>
      <div className="wrap">
        <div className="section-head">
          <span className="eyebrow">Калькулятор газоблока</span>
          <h2>Посчитайте, сколько нужно блока</h2>
          <p>Введите габариты дома — покажу объём, количество блоков, поддонов и баллонов пено-клея. Расчёт можно сразу отправить мне в MAX.</p>
        </div>
        <Calculator />
      </div>
    </section>
  );
}

function ChooseStrip() {
  const items = [
    { k: 'D400 — D600', t: 'Подберём плотность', d: 'Тепло или прочность — объясню разницу и помогу выбрать марку под ваш дом.' },
    { k: 'Пено-клей', t: 'Тонкий шов', d: 'Весь дом собран на пено-клее: меньше мостиков холода, быстрее и чище.' },
    { k: 'Завод Грас', t: 'Проверенный блок', d: 'Геометрия и качество, которым доверяю — кладу такой же сам.' },
    { k: 'Волгоград', t: 'Доставка по области', d: 'Привезу на участок. Оформление и оплата — без беготни.' },
  ];
  return (
    <section className="section section--tight">
      <div className="wrap">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(220px,1fr))', gap: 1, background: 'var(--line)', border: '1px solid var(--line)', borderRadius: 'var(--radius)', overflow: 'hidden' }}>
          {items.map((it, i) => (
            <div key={i} style={{ background: 'var(--surface)', padding: 'clamp(22px,3vw,30px)', display: 'flex', flexDirection: 'column', gap: 8 }}>
              <span className="mono" style={{ fontSize: 12, color: 'var(--accent-ink)', letterSpacing: '.04em' }}>{it.k}</span>
              <h3 style={{ fontSize: 19, fontWeight: 700 }}>{it.t}</h3>
              <p style={{ fontSize: 14, color: 'var(--ink-2)', lineHeight: 1.5 }}>{it.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [sec, setSec] = React.useState(() => ({ ...(window.GB.SECTIONS || {}) }));

  const toggleSec = (k) => {
    setSec(prev => {
      const next = { ...prev, [k]: !prev[k] };
      try {
        const d = window.GBStore.get();
        d.SECTIONS = next;
        window.GBStore.save(d);
      } catch (e) {}
      window.dispatchEvent(new CustomEvent('gb:sections', { detail: next }));
      return next;
    });
  };

  React.useEffect(() => {
    document.documentElement.setAttribute('data-accent', t.accent);
  }, [t.accent]);

  React.useEffect(() => {
    document.getElementById('root').classList.add('ready');
    if (window.gbInitMetrika) window.gbInitMetrika();
  }, []);

  return (
    <React.Fragment>
      <Header />
      <main>
        <Hero showMarquee={t.showMarquee} />
        <ChooseStrip />
        {sec.calc !== false && <CalcSection />}
        {sec.products !== false && <Products />}
        {sec.bricks !== false && <BrickCalcSection />}
        {sec.bricks !== false && <BrickCatalog />}
        {sec.beton !== false && <BetonSection />}
        {sec.gbi !== false && <GbiSection />}
        {sec.video !== false && <Videos />}
        {sec.articles !== false && <Articles />}
        {sec.projects !== false && <Projects />}
        <BimSection />
        {sec.delivery !== false && <DeliverySection />}
        {sec.faq !== false && <FAQ />}
        <OrderForm />
      </main>
      <Footer />
      <ArticleModal />
      <ProjectModal />
      <SectionsFab sec={sec} onToggle={toggleSec} />

      <TweaksPanel>
        <TweakSection label="Акцентный цвет" />
        <TweakColor label="Акцент" value={ACCENT_COLORS[t.accent]}
          options={Object.values(ACCENT_COLORS)}
          onChange={(v) => {
            const name = Object.keys(ACCENT_COLORS).find(k => ACCENT_COLORS[k] === v);
            setTweak('accent', name || 'clay');
          }} />
        <TweakSection label="Главный экран" />
        <TweakToggle label="Бегущая строка" value={t.showMarquee} onChange={(v) => setTweak('showMarquee', v)} />
        <TweakSection label="Разделы сайта" />
        {SECTION_LABELS.map(s => (
          <TweakToggle key={s.k} label={s.label} value={sec[s.k] !== false} onChange={() => toggleSec(s.k)} />
        ))}
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
